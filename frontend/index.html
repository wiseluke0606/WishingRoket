<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소망 로켓 (Wishing Rocket) - 실시간 익명 응원 보드</title>
  
  <!-- SEO 메타 태그 -->
  <meta name="description" content="우주 공간에 익명으로 따뜻한 응원과 소망을 실어 둥둥 띄우는 실시간 무중력 메시지 보드 서비스입니다.">
  <meta name="keywords" content="소망로켓, Wishing Rocket, 익명보드, 실시간응원, Supabase, SQL Trigger, Antigravity">
  
  <!-- Google Fonts 로드 (Space Grotesk & Noto Sans KR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            space: ['Space Grotesk', 'sans-serif'],
            sans: ['Noto Sans KR', 'sans-serif'],
          },
        }
      }
    }
  </script>
  
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <!-- Supabase JS Client CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>

  <style>
    /* 무중력 유영 애니메이션 정의 */
    @keyframes floatAntigravity {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      33% {
        transform: translate3d(var(--drift-x), var(--drift-y), 0) rotate(var(--rotate-one));
      }
      66% {
        transform: translate3d(calc(var(--drift-x) * -0.7), calc(var(--drift-y) * 1.3), 0) rotate(var(--rotate-two));
      }
      100% {
        transform: translate3d(calc(var(--drift-x) * 0.3), calc(var(--drift-y) * -0.5), 0) rotate(0deg);
      }
    }

    .antigravity-card {
      position: absolute;
      animation: floatAntigravity var(--duration) infinite ease-in-out;
      will-change: transform;
      cursor: grab;
      transition: scale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
    }

    .antigravity-card:active {
      cursor: grabbing;
      scale: 1.05;
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
    }

    /* 별 반짝임 애니메이션 */
    @keyframes twinkle {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      50% { opacity: 0.9; transform: scale(1.3); }
    }

    .star {
      position: absolute;
      background-color: white;
      border-radius: 50%;
      animation: twinkle var(--speed) infinite ease-in-out;
    }

    /* 반투명 블러 스크롤바 커스텀 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-purple-950 to-slate-950 text-slate-100 font-sans min-h-screen overflow-hidden relative selection:bg-purple-500/30 selection:text-purple-200">

  <!-- 뒷배경: 별이 흐르는 성운 배경 레이어 -->
  <div id="starsContainer" class="absolute inset-0 pointer-events-none z-0"></div>

  <!-- 메인 레이아웃 구조 -->
  <div class="flex flex-col h-screen relative z-10">
    
    <!-- 1. 헤더 영역 (반투명 블러 효과) -->
    <header class="w-full backdrop-blur-md bg-slate-900/40 border-b border-white/5 px-6 py-4 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="p-2 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-xl shadow-lg shadow-purple-500/20">
          <i data-lucide="rocket" class="w-6 h-6 text-white animate-pulse"></i>
        </div>
        <div>
          <div class="flex items-center space-x-2">
            <h1 class="text-xl font-bold font-space tracking-wide bg-gradient-to-r from-purple-300 via-pink-300 to-indigo-300 bg-clip-text text-transparent">
              Wishing Rocket
            </h1>
            <!-- 로컬 데모 모드 작동 상태 뱃지 -->
            <span id="modeBadge" class="px-2 py-0.5 text-[10px] font-bold rounded-full backdrop-blur-md bg-amber-500/10 border border-amber-500/30 text-amber-300 flex items-center gap-1">
              <span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-ping"></span>
              로컬 데모 모드
            </span>
          </div>
          <p class="text-xs text-slate-400 font-medium">실시간 익명 응원 및 소망 보드</p>
        </div>
      </div>
      
      <!-- 설정 버튼 -->
      <button id="configBtn" class="flex items-center space-x-2 px-3 py-1.5 rounded-lg backdrop-blur-md bg-white/5 hover:bg-white/10 border border-white/10 transition duration-200 text-sm font-medium hover:text-purple-300">
        <i data-lucide="settings" class="w-4 h-4"></i>
        <span class="hidden sm:inline">Supabase 연결 설정</span>
      </button>
    </header>

    <!-- 2. 메시지 보드 영역 (무중력 카드가 둥둥 떠다니는 메인 공간) -->
    <main id="board" class="flex-1 w-full relative overflow-hidden">
      <!-- 로딩 인디케이터 -->
      <div id="loadingIndicator" class="absolute inset-0 flex flex-col items-center justify-center space-y-3 z-50 pointer-events-none transition-opacity duration-500">
        <div class="w-10 h-10 border-4 border-purple-500/30 border-t-purple-400 rounded-full animate-spin"></div>
        <p class="text-sm text-slate-400 font-medium">우주 공간에서 메시지를 탐색하는 중...</p>
      </div>

      <!-- 보드 설명 안내 (메시지가 없을 때 표시됨) -->
      <div id="emptyMessage" class="absolute inset-0 hidden flex-col items-center justify-center text-center px-4 space-y-4 pointer-events-none">
        <i data-lucide="sparkles" class="w-12 h-12 text-purple-400/40"></i>
        <div class="space-y-1">
          <p class="text-lg font-semibold text-slate-300">아직 우주에 떠다니는 소망이 없습니다.</p>
          <p class="text-sm text-slate-500">아래 입력창에서 첫 번째 소망 로켓을 쏘아 올려보세요!</p>
        </div>
      </div>
    </main>

    <!-- 3. 하단 메시지 입력 컨트롤러 (반투명 블러 조종석 모티브) -->
    <footer class="w-full px-6 py-6 md:py-8 backdrop-blur-lg bg-slate-900/60 border-t border-white/10 flex justify-center z-20">
      <form id="messageForm" class="w-full max-w-2xl flex flex-col sm:flex-row items-stretch gap-3">
        <!-- 텍스트 입력부 -->
        <div class="flex-1 relative flex items-center bg-white/5 border border-white/10 rounded-xl focus-within:border-purple-400/50 transition-all duration-300 shadow-inner">
          <input 
            type="text" 
            id="messageInput" 
            placeholder="우주에 띄울 소망이나 따뜻한 응원을 적어주세요 (최대 100자)" 
            maxlength="100"
            autocomplete="off"
            class="w-full bg-transparent px-4 py-3.5 outline-none text-slate-100 placeholder:text-slate-500 text-sm md:text-base font-normal pr-16"
          />
          <!-- 글자수 카운터 -->
          <div class="absolute right-4 text-xs font-mono text-slate-400 font-semibold px-2 py-1 rounded bg-white/5 border border-white/5">
            <span id="charCount">0</span>/100
          </div>
        </div>

        <!-- 전송 버튼 -->
        <button 
          type="submit" 
          id="submitBtn"
          class="px-6 py-3.5 bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 active:scale-95 text-white font-semibold rounded-xl flex items-center justify-center space-x-2 transition duration-200 shadow-lg shadow-purple-500/20"
        >
          <i data-lucide="send" class="w-5 h-5 transition-transform duration-300 group-hover:translate-x-1"></i>
          <span>쏘아 올리기</span>
        </button>
      </form>
    </footer>

  </div>

  <!-- 4. Supabase 연동 설정 모달창 (반투명 글래스모피즘 적용) -->
  <div id="configModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden px-4">
    <div class="w-full max-w-md backdrop-blur-xl bg-slate-900/80 border border-white/10 rounded-2xl shadow-2xl overflow-hidden p-6 space-y-5">
      <div class="flex items-center justify-between border-b border-white/5 pb-4">
        <div class="flex items-center space-x-2.5">
          <i data-lucide="database" class="w-5 h-5 text-purple-400"></i>
          <h2 class="text-lg font-bold text-slate-100">Supabase 연결 설정</h2>
        </div>
        <button id="closeConfigBtn" class="p-1 rounded-lg hover:bg-white/10 text-slate-400 hover:text-white transition duration-150">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <div class="space-y-4">
        <div class="space-y-1.5">
          <label for="sbUrl" class="text-xs font-semibold text-slate-300">Supabase Project URL</label>
          <input 
            type="text" 
            id="sbUrl" 
            placeholder="https://your-project.supabase.co" 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4.5 py-3 outline-none text-slate-100 placeholder:text-slate-600 text-sm focus:border-purple-400/50 transition duration-150"
          />
        </div>
        <div class="space-y-1.5">
          <label for="sbAnonKey" class="text-xs font-semibold text-slate-300">Supabase Anonymous (anon) Key</label>
          <input 
            type="password" 
            id="sbAnonKey" 
            placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." 
            class="w-full bg-white/5 border border-white/10 rounded-xl px-4.5 py-3 outline-none text-slate-100 placeholder:text-slate-600 text-sm focus:border-purple-400/50 transition duration-150"
          />
        </div>
        
        <div class="p-3.5 bg-purple-500/10 border border-purple-500/20 rounded-xl flex items-start space-x-2.5">
          <i data-lucide="info" class="w-5 h-5 text-purple-400 shrink-0 mt-0.5"></i>
          <p class="text-xs text-purple-300/90 leading-relaxed font-medium">
            GitHub Secrets로 환경변수를 등록하여 빌드하셨다면 서버에 자동 연결되어 있습니다. 개별 수동 설정을 원하시면 위 입력칸을 작성해 주세요.
          </p>
        </div>
      </div>

      <div class="flex items-center justify-between pt-2 border-t border-white/5">
        <button id="useLocalModeBtn" class="px-4 py-2.5 rounded-xl text-xs font-bold text-slate-400 hover:text-white hover:bg-white/5 transition duration-150">
          로컬 데모로 계속하기
        </button>
        <div class="flex items-center space-x-2">
          <button id="resetConfigBtn" class="px-3.5 py-2.5 rounded-xl text-xs font-bold text-slate-400 hover:text-white hover:bg-white/5 transition duration-150">
            초기화
          </button>
          <button id="saveConfigBtn" class="px-5 py-2.5 bg-gradient-to-r from-purple-500 to-indigo-500 hover:from-purple-600 hover:to-indigo-600 active:scale-95 text-white font-bold rounded-xl text-xs shadow-lg shadow-purple-500/20 transition duration-150">
            연결 저장
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 5. 프론트엔드 자바스크립트 비즈니스 로직 -->
  <script>
    // 전역 상태 및 인스턴스 관리 객체
    const state = {
      mode: "local", // "local" 또는 "supabase"
      supabaseClient: null,
      config: {
        // GitHub Actions 빌드 시점에 Secrets에서 가져온 값으로 치환될 임시 플레이스홀더
        supabaseUrl: "https://ebuonfmyyfdipdgboztk.supabase.co",
        supabaseAnonKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidW9uZm15eWZkaXBkZ2JvenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzUwNjksImV4cCI6MjA5NjMxMTA2OX0.Vq4qsArQ_NV0JTb1LZ_xn7Q9PGqyf2b2VogUekt02lc"
      },
      activeCard: null,
      isDragging: false,
      dragOffset: { x: 0, y: 0 }
    };

    // 로컬 모드일 때 사용할 감성 우주 샘플 메시지
    const LOCAL_SAMPLE_MESSAGES = [
      { id: "sample-1", content: "올해는 모두 몸도 마음도 아프지 않고 행복하길! 🚀", color: "#C7CEEA", created_at: new Date(Date.now() - 1000 * 60 * 5).toISOString() },
      { id: "sample-2", content: "원하는 곳에 찰떡같이 취업 성공하게 해주세요 ✨", color: "#FFB7B2", created_at: new Date(Date.now() - 1000 * 60 * 30).toISOString() },
      { id: "sample-3", content: "무중력 공간처럼 가볍고 평온한 하루가 되기를 🌌", color: "#B5EAD7", created_at: new Date(Date.now() - 1000 * 60 * 60 * 2).toISOString() },
      { id: "sample-4", content: "적게 일하고 아주 많이 버는 기적이 일어나길 바랍니다 💰", color: "#FFDAC1", created_at: new Date(Date.now() - 1000 * 60 * 60 * 5).toISOString() },
      { id: "sample-5", content: "나의 소망아, 저 높은 우주 끝까지 자유롭게 날아가라! 💫", color: "#D5AAFF", created_at: new Date(Date.now() - 1000 * 60 * 60 * 24).toISOString() }
    ];

    // 1. 초기 별자리 백그라운드 생성 함수
    function createStars() {
      const container = document.getElementById("starsContainer");
      const starCount = 60;
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement("div");
        star.className = "star";
        
        const size = Math.random() * 2.5 + 0.5; // 별 크기 0.5px ~ 3px
        const posX = Math.random() * 100;
        const posY = Math.random() * 100;
        const speed = Math.random() * 4 + 2; // 애니메이션 속도 2s ~ 6s
        
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${posX}%`;
        star.style.top = `${posY}%`;
        star.style.setProperty("--speed", `${speed}s`);
        
        container.appendChild(star);
      }
    }

    // 2. LocalStorage 기반 설정 입출력 및 GitHub Actions 환경변수 인식 함수
    function loadConfig() {
      // 1) 만약 빌드 시점에 GitHub Actions 환경변수가 주입(치환)되었다면, 우선하여 서버 연동 모드로 진입합니다.
      const hasBuildSecrets = 
        state.config.supabaseUrl && 
        state.config.supabaseUrl !== "https://ebuonfmyyfdipdgboztk.supabase.co" && 
        state.config.supabaseUrl.trim() !== "" &&
        state.config.supabaseAnonKey && 
        state.config.supabaseAnonKey !== "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVidW9uZm15eWZkaXBkZ2JvenRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3MzUwNjksImV4cCI6MjA5NjMxMTA2OX0.Vq4qsArQ_NV0JTb1LZ_xn7Q9PGqyf2b2VogUekt02lc" && 
        state.config.supabaseAnonKey.trim() !== "";

      if (hasBuildSecrets) {
        state.mode = "supabase";
        updateModeBadge();
        return;
      }

      // 2) 빌드 시점 주입이 없었을 경우, LocalStorage에 저장된 수동 설정 정보가 있는지 읽어옵니다.
      const saved = localStorage.getItem("wishing_rocket_config");
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          if (parsed.supabaseUrl && parsed.supabaseAnonKey) {
            state.config.supabaseUrl = parsed.supabaseUrl;
            state.config.supabaseAnonKey = parsed.supabaseAnonKey;
            state.mode = "supabase";
            
            document.getElementById("sbUrl").value = parsed.supabaseUrl;
            document.getElementById("sbAnonKey").value = parsed.supabaseAnonKey;
          }
        } catch (e) {
          console.error("저장된 설정을 파싱하는 중 오류가 발생했습니다.", e);
        }
      }
      updateModeBadge();
    }

    function saveConfig() {
      const sbUrl = document.getElementById("sbUrl").value.trim();
      const sbAnonKey = document.getElementById("sbAnonKey").value.trim();

      if (!sbUrl || !sbAnonKey) {
        alert("모든 설정 값을 입력해 주세요.");
        return false;
      }

      state.config = {
        supabaseUrl: sbUrl,
        supabaseAnonKey: sbAnonKey
      };

      state.mode = "supabase";
      localStorage.setItem("wishing_rocket_config", JSON.stringify(state.config));
      updateModeBadge();
      return true;
    }

    // 헤더 상태 표시 뱃지 갱신 함수
    function updateModeBadge() {
      const badge = document.getElementById("modeBadge");
      if (state.mode === "supabase") {
        badge.className = "px-2 py-0.5 text-[10px] font-bold rounded-full backdrop-blur-md bg-purple-500/10 border border-purple-500/30 text-purple-300 flex items-center gap-1";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-purple-400"></span>서버 연결 완료`;
      } else {
        badge.className = "px-2 py-0.5 text-[10px] font-bold rounded-full backdrop-blur-md bg-amber-500/10 border border-amber-500/30 text-amber-300 flex items-center gap-1";
        badge.innerHTML = `<span class="w-1.5 h-1.5 rounded-full bg-amber-400 animate-ping"></span>로컬 데모 모드`;
      }
    }

    // 3. Supabase Client 초기화 및 데이터 연동 분기
    function initializeConnection() {
      if (state.mode === "supabase") {
        try {
          state.supabaseClient = supabase.createClient(state.config.supabaseUrl, state.config.supabaseAnonKey);
          loadInitialMessages();
          subscribeRealtimeMessages();
        } catch (err) {
          console.error("Supabase 클라이언트 초기화 실패, 로컬 모드로 전환:", err);
          state.mode = "local";
          updateModeBadge();
          loadInitialMessages();
        }
      } else {
        // 로컬 데모 모드 시작
        loadInitialMessages();
      }
    }

    // 4. 초기 메시지 리스트 조회
    async function loadInitialMessages() {
      const board = document.getElementById("board");
      const loader = document.getElementById("loadingIndicator");
      const emptyMsg = document.getElementById("emptyMessage");
      
      loader.classList.remove("opacity-0");
      emptyMsg.classList.add("hidden");

      board.querySelectorAll(".antigravity-card").forEach(el => el.remove());

      if (state.mode === "supabase" && state.supabaseClient) {
        // Supabase에서 데이터 읽기
        const { data, error } = await state.supabaseClient
          .from("messages")
          .select("*")
          .order("created_at", { ascending: false })
          .limit(30);

        loader.classList.add("opacity-0");

        if (error) {
          console.error("데이터 로드 실패, 로컬 모드로 동작합니다:", error.message);
          state.mode = "local";
          updateModeBadge();
          loadLocalMessages();
          return;
        }

        if (data && data.length > 0) {
          data.reverse().forEach(message => renderMessageCard(message));
        } else {
          emptyMsg.classList.remove("hidden");
        }
      } else {
        // 로컬 모드로 데이터 읽기
        loader.classList.add("opacity-0");
        loadLocalMessages();
      }
    }

    // LocalStorage에서 로컬 메시지 읽기 및 샘플 기본 세팅
    function loadLocalMessages() {
      const emptyMsg = document.getElementById("emptyMessage");
      let localData = localStorage.getItem("wishing_rocket_local_messages");
      
      if (!localData) {
        // 처음 방문하여 데이터가 없는 경우 가이드용 샘플 탑재
        localStorage.setItem("wishing_rocket_local_messages", JSON.stringify(LOCAL_SAMPLE_MESSAGES));
        localData = JSON.stringify(LOCAL_SAMPLE_MESSAGES);
      }

      try {
        const messages = JSON.parse(localData);
        if (messages.length > 0) {
          messages.forEach(message => renderMessageCard(message));
        } else {
          emptyMsg.classList.remove("hidden");
        }
      } catch (e) {
        console.error("로컬 데이터를 파싱하는 중 에러 발생:", e);
        emptyMsg.classList.remove("hidden");
      }
    }

    // 5. Supabase Realtime 구독 설정 (서버 연결인 경우만 작동)
    function subscribeRealtimeMessages() {
      if (state.mode !== "supabase" || !state.supabaseClient) return;

      state.supabaseClient.removeAllChannels();

      state.supabaseClient
        .channel("schema-db-changes")
        .on(
          "postgres_changes",
          { event: "INSERT", schema: "public", table: "messages" },
          (payload) => {
            renderMessageCard(payload.new);
            document.getElementById("emptyMessage").classList.add("hidden");
          }
        )
        .subscribe();
    }

    // 6. 개별 메시지 카드 렌더링 및 무중력 애니메이션 부여
    function renderMessageCard(message) {
      const board = document.getElementById("board");
      const card = document.createElement("div");
      
      card.className = "antigravity-card px-4 py-3.5 rounded-2xl border text-sm max-w-[220px] shadow-lg flex flex-col space-y-1.5 transition-all duration-300 select-none z-10 text-slate-900 font-medium";
      card.dataset.id = message.id;
      
      const baseColor = message.color || "#C7CEEA";
      card.style.backgroundColor = `${baseColor}E6`; // 90% 불투명도 적용
      card.style.borderColor = `${baseColor}FF`;
      
      const contentEl = document.createElement("p");
      contentEl.className = "break-words whitespace-normal leading-relaxed text-slate-900";
      contentEl.textContent = message.content;
      card.appendChild(contentEl);

      const timeEl = document.createElement("span");
      timeEl.className = "text-[10px] text-slate-800/60 font-semibold self-end";
      timeEl.textContent = formatKoreanTime(message.created_at);
      card.appendChild(timeEl);

      const cardWidth = 180;
      const cardHeight = 80;
      const boardWidth = board.clientWidth || window.innerWidth;
      const boardHeight = board.clientHeight || (window.innerHeight - 200);

      const initialX = Math.random() * (boardWidth - cardWidth);
      const initialY = Math.random() * (boardHeight - cardHeight - 80) + 40;

      card.style.left = `${initialX}px`;
      card.style.top = `${initialY}px`;

      const driftX = (Math.random() * 80 - 40) + "px";
      const driftY = (Math.random() * 80 - 40) + "px";
      const duration = (Math.random() * 8 + 8) + "s";
      const rotateOne = (Math.random() * 6 - 3) + "deg";
      const rotateTwo = (Math.random() * 6 - 3) + "deg";

      card.style.setProperty("--drift-x", driftX);
      card.style.setProperty("--drift-y", driftY);
      card.style.setProperty("--duration", duration);
      card.style.setProperty("--rotate-one", rotateOne);
      card.style.setProperty("--rotate-two", rotateTwo);

      makeCardDraggable(card);
      board.appendChild(card);
    }

    // 7. 한국 시간 포맷 변환 함수
    function formatKoreanTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      
      const diffMs = now - date;
      const diffMin = Math.floor(diffMs / (1000 * 60));
      const diffHour = Math.floor(diffMs / (1000 * 60 * 60));

      if (diffMin < 1) return "방금 전";
      if (diffMin < 60) return `${diffMin}분 전`;
      if (diffHour < 24) return `${diffHour}시간 전`;
      
      return `${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    // 8. 카드 드래그 기능 (마우스 & 모바일 터치 대응)
    function makeCardDraggable(cardElement) {
      const board = document.getElementById("board");

      const startDrag = (clientX, clientY) => {
        state.isDragging = true;
        state.activeCard = cardElement;
        
        cardElement.style.animationPlayState = "paused";
        cardElement.style.zIndex = "100";
        
        const rect = cardElement.getBoundingClientRect();
        state.dragOffset.x = clientX - rect.left;
        state.dragOffset.y = clientY - rect.top;
      };

      const moveDrag = (clientX, clientY) => {
        if (!state.isDragging || state.activeCard !== cardElement) return;
        
        const boardRect = board.getBoundingClientRect();
        let left = clientX - boardRect.left - state.dragOffset.x;
        let top = clientY - boardRect.top - state.dragOffset.y;
        
        left = Math.max(0, Math.min(left, boardRect.width - cardElement.offsetWidth));
        top = Math.max(0, Math.min(top, boardRect.height - cardElement.offsetHeight));
        
        cardElement.style.left = `${left}px`;
        cardElement.style.top = `${top}px`;
      };

      const endDrag = () => {
        if (state.isDragging && state.activeCard === cardElement) {
          cardElement.style.animationPlayState = "running";
          cardElement.style.zIndex = "10";
          state.isDragging = false;
          state.activeCard = null;
        }
      };

      cardElement.addEventListener("mousedown", (e) => {
        e.preventDefault();
        startDrag(e.clientX, e.clientY);
      });

      window.addEventListener("mousemove", (e) => {
        if (state.isDragging && state.activeCard === cardElement) {
          moveDrag(e.clientX, e.clientY);
        }
      });

      window.addEventListener("mouseup", endDrag);

      cardElement.addEventListener("touchstart", (e) => {
        const touch = e.touches[0];
        startDrag(touch.clientX, touch.clientY);
      }, { passive: true });

      window.addEventListener("touchmove", (e) => {
        if (state.isDragging && state.activeCard === cardElement) {
          const touch = e.touches[0];
          moveDrag(touch.clientX, touch.clientY);
        }
      }, { passive: false });

      window.addEventListener("touchend", endDrag);
    }

    // 9. 메시지 전송 처리 함수 (모드 분기)
    async function submitMessage(content) {
      const submitBtn = document.getElementById("submitBtn");
      const messageInput = document.getElementById("messageInput");

      submitBtn.disabled = true;
      submitBtn.classList.add("opacity-50");
      submitBtn.querySelector("span").textContent = "발사 중...";

      const colors = ["#FFB7B2", "#FFDAC1", "#B5EAD7", "#C7CEEA", "#D5AAFF"];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];

      if (state.mode === "supabase" && state.supabaseClient) {
        // 1) SQL 트리거 방식을 사용하여 수파베이스 DB에 직접 데이터 삽입
        try {
          const { error } = await state.supabaseClient
            .from("messages")
            .insert([{ content, color: randomColor }]);

          if (error) {
            throw new Error(error.message || "메시지 발송에 실패했습니다.");
          }

          messageInput.value = "";
          document.getElementById("charCount").textContent = "0";
          messageInput.focus();
        } catch (err) {
          console.error("전송 에러:", err);
          alert("오류가 발생했습니다: " + err.message);
        } finally {
          submitBtn.disabled = false;
          submitBtn.classList.remove("opacity-50");
          submitBtn.querySelector("span").textContent = "쏘아 올리기";
        }
      } else {
        // 2) LocalStorage를 이용한 로컬 저장 데모 방식
        setTimeout(() => {
          const localData = localStorage.getItem("wishing_rocket_local_messages");
          let messages = [];
          if (localData) {
            try {
              messages = JSON.parse(localData);
            } catch (e) {
              messages = [];
            }
          }

          const newMessage = {
            id: "local-" + Math.random().toString(36).substr(2, 9),
            content: content,
            color: randomColor,
            created_at: new Date().toISOString()
          };

          messages.push(newMessage);
          localStorage.setItem("wishing_rocket_local_messages", JSON.stringify(messages));

          // 실시간 연동을 모방하기 위해 즉시 카드 렌더링
          renderMessageCard(newMessage);
          document.getElementById("emptyMessage").classList.add("hidden");

          messageInput.value = "";
          document.getElementById("charCount").textContent = "0";
          messageInput.focus();

          submitBtn.disabled = false;
          submitBtn.classList.remove("opacity-50");
          submitBtn.querySelector("span").textContent = "쏘아 올리기";
        }, 600); // 전송 딜레이 600ms 시뮬레이션
      }
    }

    // 10. UI 모달 상태 제어 함수
    function toggleModal(show) {
      const modal = document.getElementById("configModal");
      if (show) {
        modal.classList.remove("hidden");
      } else {
        modal.classList.add("hidden");
      }
    }

    // 11. 화면 리사이즈 시 카드 재정렬 (이동 애니메이션 영역 밖으로 카드가 이탈하지 않도록)
    let resizeTimer;
    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        loadInitialMessages();
      }, 500);
    });

    // 12. 초기화 및 이벤트 등록
    document.addEventListener("DOMContentLoaded", () => {
      lucide.createIcons();
      createStars();
      loadConfig();
      initializeConnection();

      // 이벤트 바인딩: 설정 버튼
      document.getElementById("configBtn").addEventListener("click", () => toggleModal(true));
      document.getElementById("closeConfigBtn").addEventListener("click", () => toggleModal(false));
      
      // 로컬 데모 모드로 계속하기 버튼
      document.getElementById("useLocalModeBtn").addEventListener("click", () => {
        state.mode = "local";
        updateModeBadge();
        toggleModal(false);
        loadInitialMessages();
      });

      // 모달 바깥 영역 클릭 시 닫기
      document.getElementById("configModal").addEventListener("click", (e) => {
        if (e.target === document.getElementById("configModal")) {
          toggleModal(false);
        }
      });

      // 설정 저장 버튼
      document.getElementById("saveConfigBtn").addEventListener("click", () => {
        if (saveConfig()) {
          toggleModal(false);
          initializeConnection();
        }
      });

      // 설정 초기화 버튼
      document.getElementById("resetConfigBtn").addEventListener("click", () => {
        if (confirm("설정을 정말 초기화하고 로컬 모드로 전환하시겠습니까?")) {
          localStorage.removeItem("wishing_rocket_config");
          document.getElementById("sbUrl").value = "";
          document.getElementById("sbAnonKey").value = "";
          state.config = { supabaseUrl: "", supabaseAnonKey: "" };
          state.mode = "local";
          updateModeBadge();
          toggleModal(false);
          loadInitialMessages();
        }
      });

      // 글자수 카운터 및 유효성 검사 바인딩
      const messageInput = document.getElementById("messageInput");
      const charCount = document.getElementById("charCount");
      
      messageInput.addEventListener("input", (e) => {
        const text = e.target.value;
        charCount.textContent = text.length;
        
        if (text.length >= 90) {
          charCount.parentElement.classList.add("text-yellow-400", "border-yellow-500/30");
          charCount.parentElement.classList.remove("text-slate-400");
        } else {
          charCount.parentElement.classList.remove("text-yellow-400", "border-yellow-500/30");
          charCount.parentElement.classList.add("text-slate-400");
        }
      });

      // 폼 제출 이벤트
      document.getElementById("messageForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const text = messageInput.value.trim();
        if (text.length === 0) {
          alert("소망 내용을 작성해 주세요.");
          return;
        }
        submitMessage(text);
      });
    });
  </script>
